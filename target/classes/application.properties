# ==========================================
# Application: Brownie Shop Order Management
# File: src/main/resources/application.properties
# ==========================================

# Application name
spring.application.name=brownies

# Server port
server.port=8080

# ==========================================
# MySQL Database Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/brownies_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=ms12122004#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
# update: auto-creates/updates tables based on entities (use 'create' for first run)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Thymeleaf Configuration
# ==========================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ==========================================
# Logging
# ==========================================
logging.level.com.example.brownies=DEBUG
logging.level.org.springframework.security=INFO
