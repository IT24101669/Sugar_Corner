<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Brownie Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-container">
    <div class="auth-box">

        <h2>Welcome Back</h2>
        <p class="subtitle">Login to your Brownie Shop account</p>

        <!-- Success messages -->
        <div th:if="${param.registered}" class="alert alert-success">
            Account created successfully! Please login.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out successfully.
        </div>
        <div th:if="${param.reset}" class="alert alert-success">
            Password reset successfully! Please login.
        </div>

        <!-- Error message -->
        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>

        <!-- Login form -->
        <form action="/login" method="post">

            <div class="form-group">
                <label>Email Address</label>
                <input type="email"
                       name="email"
                       placeholder="Enter your email"
                       required/>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Enter your password"
                           required/>
                    <span class="eye-icon" onclick="togglePassword('password', this)">👁</span>
                </div>
            </div>

            <button type="submit" class="btn-primary">Login</button>

        </form>

        <div class="auth-links">
            <a href="/reset-password">Forgot your password?</a>
            <span> | </span>
            <a href="/register">Create an account</a>
        </div>

    </div>
</div>

<script>
    function togglePassword(fieldId, icon) {
        const input = document.getElementById(fieldId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = '🙈';
        } else {
            input.type = 'password';
            icon.textContent = '👁';
        }
    }
</script>
</body>
</html>
