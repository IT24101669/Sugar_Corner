<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brownies Shop - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 min-h-screen flex items-center justify-center">
<div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10">
    <h1 class="text-4xl font-bold text-center text-orange-600 mb-8">Create Account</h1>

    <form th:action="@{/register}" method="post" class="space-y-6">
        <input type="text" name="fullName" placeholder="Full Name" required class="w-full px-4 py-3 border rounded-2xl">
        <input type="email" name="email" placeholder="Email Address" required class="w-full px-4 py-3 border rounded-2xl">
        <input type="text" name="phone" placeholder="Phone Number" class="w-full px-4 py-3 border rounded-2xl">
        <input type="password" name="password" placeholder="Password" required class="w-full px-4 py-3 border rounded-2xl">

        <button type="submit" class="w-full bg-orange-600 text-white py-4 rounded-3xl text-lg">Register</button>
    </form>

    <p class="text-center mt-6">
        Already have an account?
        <a th:href="@{/login}" class="text-orange-600 hover:underline">Login here</a>
    </p>
</div>
</body>
</html>
