<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Brownies Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-orange-50 to-amber-100 min-h-screen flex items-center justify-center">
<div class="max-w-md w-full mx-4">
  <div class="bg-white rounded-3xl shadow-2xl p-10">
    <div class="text-center mb-10">
      <div class="text-6xl mb-4">🍪</div>
      <h1 class="text-4xl font-bold text-orange-600">Brownies Shop</h1>
      <p class="text-gray-500 mt-2">Sign in to continue</p>
    </div>

    <form th:action="@{/login}" method="post" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <input type="email" name="username" required
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-orange-500 transition"
               placeholder="Enter your email">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" name="password" required
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-orange-500 transition"
               placeholder="Enter your password">
      </div>

      <button type="submit"
              class="w-full bg-orange-600 hover:bg-orange-700 text-white py-4 rounded-2xl text-lg font-semibold transition">
        Login
      </button>
    </form>

    <div class="mt-6 text-center">
      <a th:href="@{/register}" class="text-orange-600 hover:underline text-sm">Don't have an account? Register</a>
    </div>

    <div th:if="${error}" class="mt-6 p-4 bg-red-100 text-red-700 rounded-2xl text-center">
      Invalid email or password
    </div>
  </div>
</div>
</body>
</html>
