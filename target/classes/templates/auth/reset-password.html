<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Sugar Corner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-orange-50 to-amber-100 min-h-screen flex items-center justify-center">
<div class="max-w-md w-full mx-4">
  <div class="bg-white rounded-3xl shadow-2xl p-10">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-orange-600">Reset Password</h1>
      <p class="text-gray-500 mt-3">Enter your email to receive reset link</p>
    </div>

    <form th:action="@{/reset-password}" method="post" class="space-y-6">
      <input type="email" name="email" required
             class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-orange-500"
             placeholder="Your Email Address">

      <button type="submit"
              class="w-full bg-orange-600 hover:bg-orange-700 text-white py-4 rounded-2xl text-lg font-semibold transition">
        Send Reset Link
      </button>
    </form>

    <div th:if="${success}" class="mt-6 p-4 bg-green-100 text-green-700 rounded-2xl text-center">
      Reset link sent! Please check your email.
    </div>
    <div th:if="${error}" class="mt-6 p-4 bg-red-100 text-red-700 rounded-2xl text-center" th:text="${error}">
    </div>

    <div class="text-center mt-8">
      <a th:href="@{/login}" class="text-orange-600 hover:underline">Back to Login</a>
    </div>
  </div>
</div>
</body>
</html>
