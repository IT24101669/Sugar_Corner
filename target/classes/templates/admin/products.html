<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div th:replace="~{fragments/admin-layout :: admin-layout(content='admin/products-content')}">
  <div class="flex justify-between mb-8">
    <h1 class="text-4xl font-bold">Products Management</h1>
    <button onclick="showAddProductModal()"
            class="bg-orange-600 text-white px-6 py-3 rounded-2xl font-medium">
      + Add New Product
    </button>
  </div>

  <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- JS මගින් load වෙනවා -->
  </div>
</div>

<script th:src="@{/js/products.js}"></script>
</body>
</html>
