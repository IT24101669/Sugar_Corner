<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div th:replace="~{fragments/admin-layout :: admin-layout(content='admin/orders-content')}">
  <h1 class="text-4xl font-bold mb-8">Orders Management</h1>

  <div class="bg-white rounded-3xl shadow overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-100">
      <tr>
        <th class="p-6 text-left">Order ID</th>
        <th class="p-6 text-left">Customer</th>
        <th class="p-6 text-left">Status</th>
        <th class="p-6 text-right">Total</th>
        <th class="p-6 text-center">Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="order : ${allOrders}" class="border-t hover:bg-gray-50">
        <td class="p-6">#<span th:text="${order.id}"></span></td>
        <td class="p-6" th:text="${order.customerName}"></td>
        <td class="p-6">
                            <span th:text="${order.status}" class="px-4 py-1 rounded-full text-sm"
                                  th:classappend="${order.status == 'PENDING'} ? 'bg-orange-100 text-orange-700' :
                                                  ${order.status == 'DELIVERED'} ? 'bg-green-100 text-green-700' : 'bg-amber-100'">
                            </span>
        </td>
        <td class="p-6 text-right font-medium" th:text="${order.totalAmount}"></td>
        <td class="p-6 text-center">
          <button onclick="updateOrderStatus([[${order.id}]], 'CONFIRMED')"
                  class="text-blue-600 hover:underline mx-2">Confirm</button>
          <button onclick="updateOrderStatus([[${order.id}]], 'IN_PREPARATION')"
                  class="text-amber-600 hover:underline mx-2">Prepare</button>
          <button onclick="updateOrderStatus([[${order.id}]], 'DELIVERED')"
                  class="text-green-600 hover:underline mx-2">Delivered</button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  function updateOrderStatus(id, status) {
    fetch(`/admin/orders/${id}/status?status=${status}`, { method: 'POST' })
            .then(() => location.reload());
  }
</script>
</body>
</html>
