<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
<div class="text-center">
    <h1 class="text-9xl font-bold text-orange-300">404</h1>
    <p class="text-3xl mt-4 text-gray-600">Oops! Page not found</p>
    <a th:href="@{/static}"
       class="mt-10 inline-block bg-orange-600 text-white px-10 py-4 rounded-3xl text-lg font-medium">
        Back to Home
    </a>
</div>
</body>
</html>
