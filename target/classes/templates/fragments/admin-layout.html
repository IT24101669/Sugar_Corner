<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} ?: 'Sugar Corner Admin'">Sugar Corner Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<!-- Top Bar -->
<nav class="bg-amber-800 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <span class="text-3xl">🍪</span>
      <h1 class="text-2xl font-bold">Sugar Corner Admin</h1>
    </div>
    <div class="flex items-center gap-6">
      <span class="text-sm">Admin</span>
      <a th:href="@{/logout}"
         class="bg-white text-amber-800 px-6 py-2 rounded-2xl font-medium hover:bg-amber-100">
        Logout
      </a>
    </div>
  </div>
</nav>

<div class="flex min-h-screen">
  <!-- Sidebar -->
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <!-- Main Content -->
  <div class="flex-1 p-8 bg-gray-50">
    <div th:insert="${content}"></div>
  </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script th:src="@{/js/admin.js}"></script>
</body>
</html>
