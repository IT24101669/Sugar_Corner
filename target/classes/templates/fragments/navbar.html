<div th:fragment="navbar" class="bg-orange-600 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="/static" class="text-2xl font-bold flex items-center gap-2">
            🍪 Brownies Shop
        </a>

        <div class="flex items-center gap-6">
            <span th:if="${#httpSession.getAttribute('role') == 'CUSTOMER'}"
                  class="text-sm">
                Welcome, <span th:text="${#httpSession.getAttribute('loggedInCustomer')?.fullName}"></span>
            </span>
            <a th:href="@{/logout}"
               class="hover:bg-orange-700 px-4 py-2 rounded-lg text-sm transition">
                Logout
            </a>
        </div>
    </div>
</div>
