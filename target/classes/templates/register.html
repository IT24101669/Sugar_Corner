<!DOCTYPE html>
<!-- File: src/main/resources/templates/register.html -->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Register — Brownie Shop</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #1A0D05 0%, #3B1F0A 50%, #6B3D1E 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .auth-container { width: 100%; max-width: 480px; animation: scaleIn 0.5s ease; }

    .auth-logo { text-align: center; margin-bottom: 1.5rem; }
    .auth-logo h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold); font-style: italic; }
    .auth-logo p { color: rgba(253,246,236,0.6); font-size: 0.8rem; margin-top: 0.25rem; letter-spacing: 2px; text-transform: uppercase; }

    .auth-card { background: rgba(255,255,255,0.97); border-radius: 20px; padding: 2.5rem; box-shadow: 0 32px 80px rgba(0,0,0,0.4); }
    .auth-card h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--chocolate); margin-bottom: 0.25rem; }
    .auth-card .subtitle { color: var(--cocoa); font-size: 0.88rem; margin-bottom: 2rem; }

    .grid-reg { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media(max-width:480px){ .grid-reg { grid-template-columns:1fr; } }

    .btn-register { width:100%; padding:0.85rem; background:linear-gradient(135deg, var(--caramel), var(--cocoa)); color:white; border:none; border-radius:10px; font-size:1rem; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; transition:var(--transition); margin-top:0.5rem; }
    .btn-register:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(107,61,30,0.4); }

    .auth-footer { text-align:center; margin-top:1.5rem; font-size:0.88rem; color:var(--cocoa); }
    .auth-footer a { color:var(--caramel); text-decoration:none; font-weight:600; }

    .drip-bar { height:5px; background:linear-gradient(90deg, var(--caramel), var(--gold), var(--caramel)); background-size:200% 100%; border-radius:3px 3px 0 0; animation:shimmer 2s linear infinite; border-radius:20px 20px 0 0; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <h1>🍫 Brownie Shop</h1>
      <p>Create your account</p>
    </div>

    <div class="auth-card">
      <div class="drip-bar"></div><br>
      <h2>Join us</h2>
      <p class="subtitle">Create a customer account to place orders</p>

      <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

      <form method="post" action="/register">
        <div class="grid-reg">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="fullName" class="form-control" placeholder="Jane Smith" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" name="phone" class="form-control" placeholder="+94 77 123 4567">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Delivery Address</label>
          <input type="text" name="address" class="form-control" placeholder="123 Main Street, City">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Create a strong password" required minlength="6">
        </div>

        <button type="submit" class="btn-register">Create Account →</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>
</body>
</html>
