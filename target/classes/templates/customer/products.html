<div th:replace="~{fragments/main :: main(content='customer/products')}">
  <h1 class="text-4xl font-bold mb-8 text-gray-800">Our Delicious Brownies</h1>

  <div class="mb-8 flex flex-wrap gap-4">
    <input type="text" id="searchInput" placeholder="Search brownies..."
           class="flex-1 px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-orange-500">
    <button onclick="searchProducts()" class="bg-orange-600 text-white px-8 py-3 rounded-2xl font-medium">Search</button>
  </div>

  <div id="productContainer" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <!-- JS loads products -->
  </div>

  <h2 class="text-3xl font-bold mt-16 mb-8">Featured Treats</h2>
  <div id="featuredContainer" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <!-- JS loads featured -->
  </div>
</div>

<script th:src="@{/js/products.js}"></script>
