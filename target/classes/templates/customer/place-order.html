<div th:replace="~{fragments/main :: main(content='customer/place-order')}">
  <h1 class="text-4xl font-bold text-center mb-10">Place Your Order</h1>

  <div class="grid lg:grid-cols-12 gap-10 max-w-6xl mx-auto">
    <!-- Cart Items -->
    <div class="lg:col-span-7 bg-white rounded-3xl shadow-xl p-8">
      <h2 class="text-2xl font-semibold mb-6">🛒 Your Cart (<span id="cartCount">0</span>)</h2>
      <div id="cartContainer" class="space-y-6 min-h-[400px]">
        <!-- JS will load -->
      </div>
      <div class="text-center mt-8">
        <a th:href="@{/customer/products}" class="text-orange-600 hover:underline">+ Add More Brownies</a>
      </div>
    </div>

    <!-- Summary -->
    <div class="lg:col-span-5">
      <div class="bg-white rounded-3xl shadow-xl p-8 sticky top-6">
        <h2 class="text-2xl font-semibold mb-6">Order Summary</h2>
        <!-- Your existing summary, address, payment section -->
        <button onclick="submitOrder()"
                class="w-full py-6 bg-green-600 hover:bg-green-700 text-white text-xl font-bold rounded-3xl">
          Confirm Order & Place
        </button>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/customer.js}"></script>
