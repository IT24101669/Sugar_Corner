# ===============================
# APPLICATION NAME & SERVER
# ===============================
spring.application.name=brownies-shop
server.port=8080

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/brownies_shop_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Colombo&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=Deepana#609
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Better logging for debugging (Register ?????? INSERT query ?????)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.transaction=DEBUG

# ===============================
# STATIC RESOURCES
# ===============================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
spring.web.resources.add-mappings=true

# ===============================
# FILE UPLOAD CONFIG
# ===============================
file.upload-dir=uploads/images
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# THYMELEAF CONFIG (Optional but recommended)
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===============================
# SECURITY / SESSION (Optional)
# ===============================
server.servlet.session.timeout=30m