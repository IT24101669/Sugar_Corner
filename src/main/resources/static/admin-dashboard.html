<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Support • Sugar Corner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        :root { --primary: #8B5E3C; --bg: #fdf9f2; --dark: #4a2c0b; --success: #059669; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

        /* Navigation Bar */
        .navbar {
            background: var(--primary);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .nav-links { display: flex; align-items: center; gap: 25px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; opacity: 0.9; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; }

        /* Notification Icon & Badge */
        .notification-box { position: relative; cursor: pointer; font-size: 1.4rem; }
        .badge {
            position: absolute; top: -5px; right: -8px;
            background: var(--danger); color: white;
            font-size: 0.7rem; padding: 2px 6px; border-radius: 50%;
            font-weight: bold; display: none;
        }

        /* Section Cards */
        .section-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h2 { border-left: 5px solid var(--primary); padding-left: 15px; margin-bottom: 20px; font-size: 1.3rem; color: var(--primary); }

        .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f1ea; color: var(--primary); font-size: 0.9rem; }

        button { cursor: pointer; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 600; transition: 0.3s; }
        .btn-save { background: var(--success); color: white; }

        /* Toast Notifications */
        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 9999; }
        .toast {
            background: white; color: var(--dark); padding: 15px 20px; border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); margin-bottom: 10px; border-left: 5px solid var(--primary);
            animation: slideIn 0.5s ease-out; min-width: 280px;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .status-new { color: #d97706; background: #fef3c7; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="font-size: 1.5rem; font-weight: bold;">Sugar Corner Admin</div>
    <div class="nav-links">
        <a href="#">Dashboard</a>
        <a href="#">Products</a>
        <a href="#">Orders</a>
        <div class="notification-box" onclick="clearBadge()">
            🔔 <span id="notiBadge" class="badge">0</span>
        </div>
    </div>
</nav>

<audio id="notificationSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
<div id="toastContainer" class="toast-container"></div>

<div class="container">
    <div class="section-card">
        <h2>Update Contact Details</h2>
        <div class="settings-grid">
            <input type="email" id="editEmail" placeholder="Support Email">
            <input type="text" id="editPhone" placeholder="Hotline Number">
            <input type="text" id="editAddress" placeholder="Physical Address">
            <button onclick="saveSettings()" class="btn-save">Save Changes</button>
        </div>
    </div>

    <div class="section-card">
        <h2>Customer Feedback</h2>
        <table>
            <thead>
            <tr><th>Date</th><th>Customer</th><th>Rating</th><th>Message</th><th>Action</th></tr>
            </thead>
            <tbody id="feedbackTableBody"></tbody>
        </table>
    </div>

    <div class="section-card" id="inquirySection">
        <h2>Live Inquiries</h2>
        <table>
            <thead>
            <tr><th>Date</th><th>Customer</th><th>Email</th><th>Message</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody id="inquiryTableBody"></tbody>
        </table>
    </div>
</div>

<script src="feedBadmin-support.js"></script>
<script>
    const API_URL = "http://localhost:8081/api/support";
    let unreadCount = 0;

    window.onload = () => {
        fetchSettings();
        loadFeedback();
        loadInquiries();
        connectNotification();
    };

    async function fetchSettings() {
        try {
            const res = await fetch(`${API_URL}/settings`);
            if(res.ok) {
                const data = await res.json();
                document.getElementById('editEmail').value = data.adminEmail || '';
                document.getElementById('editPhone').value = data.adminPhone || '';
                document.getElementById('editAddress').value = data.adminAddress || '';
            }
        } catch(e) { console.error("Error loading settings"); }
    }

    async function saveSettings() {
        const payload = {
            id: 1,
            adminEmail: document.getElementById('editEmail').value,
            adminPhone: document.getElementById('editPhone').value,
            adminAddress: document.getElementById('editAddress').value
        };
        const res = await fetch(`${API_URL}/settings`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        if(res.ok) alert("Settings successfully updated!");
    }

    // --- NOTIFICATION LOGIC ---
    function connectNotification() {
        const socket = new SockJS('http://localhost:8081/ws-chat');
        const stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, () => {
            stompClient.subscribe('/topic/admin/notifications', (msg) => {
                const inquiry = JSON.parse(msg.body);
                handleIncomingInquiry(inquiry);
            });
        });
    }

    function handleIncomingInquiry(inquiry) {
        // Sound
        document.getElementById('notificationSound').play().catch(() => {});

        // Update Badge
        unreadCount++;
        const badge = document.getElementById('notiBadge');
        badge.innerText = unreadCount;
        badge.style.display = 'block';

        // Show Toast
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `
            <b style="color:var(--primary)">🔔 New Inquiry Received</b>
            <span style="display:block; margin:5px 0;">From: ${inquiry.name}</span>
            <small style="color:#666">${inquiry.inquiryText.substring(0, 45)}...</small>
        `;
        container.appendChild(toast);

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = '0.5s';
            setTimeout(() => toast.remove(), 500);
        }, 8000);

        // Refresh Table
        if (typeof loadInquiries === 'function') loadInquiries();
    }

    function clearBadge() {
        unreadCount = 0;
        document.getElementById('notiBadge').style.display = 'none';
        document.getElementById('inquirySection').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
