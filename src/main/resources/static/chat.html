<!DOCTYPE html>
<html lang="en">
<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Chat • Sugar Corner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        :root { --primary: #8B5E3C; --bg: #fdf9f2; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-card { width: 400px; height: 600px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; }
        #chatMessages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 0.95rem; }
        .customer { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .admin { align-self: flex-start; background: #e9e9eb; color: #333; border-bottom-left-radius: 2px; }
        .chat-input { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 8px; }
        input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>
<div class="chat-card">
    <div class="chat-header">Sugar Corner - Support (Inquiry #<span id="displayId"></span>)</div>
    <div id="chatMessages"></div>
    <div class="chat-input">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button onclick="send()">Send</button>

    </div>
</div>

<script>
    let stompClient = null;
    const inquiryId = new URLSearchParams(window.location.search).get('id');
    document.getElementById('displayId').innerText = inquiryId;

    function connect() {
        const socket = new SockJS('http://localhost:8081/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.connect({}, () => {
            stompClient.subscribe('/topic/inquiry/' + inquiryId, (res) => {
                renderMessage(JSON.parse(res.body));
            });
        });
    }

    function send() {
        const el = document.getElementById('msgInput');
        if (el.value.trim() && stompClient) {
            const payload = { inquiryId: inquiryId, sender: 'customer', content: el.value, timestamp: new Date().toISOString() };
            stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(payload));
            el.value = '';
        }
    }

    function renderMessage(msg) {
        const div = document.createElement('div');
        div.className = `msg ${msg.sender}`;
        div.innerText = msg.content;
        document.getElementById('chatMessages').appendChild(div);
        document.getElementById('chatMessages').scrollTop = 9999;
    }
    if(inquiryId) connect();
    window.onload = () => {
        connect();
    };
</script>
</body>
</html>
