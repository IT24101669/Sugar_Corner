<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sugar Corner • Fresh Brownies & More</title>
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
<nav class="navbar">
    <div class="navbar-container">
        <a href="/products.html" class="logo">
            Sugar<span>Corner</span>
        </a>

        <div class="menu-toggle" id="menuToggle">☰</div>

        <ul class="nav-links" id="navLinks">
            <li><a href="/products.html" class="active">Shop</a></li>
            <li><a href="/admin.html">Home</a></li>
        </ul>
    </div>
</nav>
<div class="video-background">
    <video autoplay muted loop playsinline>
        <source src="/videos/background.mp4" type="video/mp4">
    </video>
</div>

<div class="content">
    <h1>Welcome to Sugar Corner</h1>
    <p>Delicious Homemade Brownies</p>
</div>
<div class="container">
    <h2>Browse Our Treats</h2>

    <div style="margin: 2rem 0; display: flex; flex-wrap: wrap; gap: 14px; align-items: center;">
        <input type="text" id="searchInput" placeholder="Search for brownies, cookies..." style="flex: 1; min-width: 220px;" />
        <button onclick="searchProducts()" class="btn btn-primary">Search</button>

        <input type="text" id="categoryFilter" placeholder="Category" style="width: 160px;" />
        <input type="number" id="minPrice" placeholder="Min Price" step="0.01" style="width: 120px;" />
        <input type="number" id="maxPrice" placeholder="Max Price" step="0.01" style="width: 120px;" />
        <button onclick="filterProducts()" class="btn btn-primary">Filter</button>
        <button onclick="location.reload()" class="btn btn-secondary">Clear All</button>
    </div>

    <div id="productContainer" class="product-grid"></div>

    <h2>Featured This Week</h2>
    <div id="featuredContainer" class="product-grid"></div>
</div>

<script src="/products.js"></script>
</body>
</html>
