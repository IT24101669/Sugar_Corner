<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Brownies • Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        :root {
            --brown-dark: #3C2F2F;
            --brown-mid: #5C4033;
            --brown-light: #8B5A2B;
            --cream: #f5e8d3;
        }
        body {
            background: linear-gradient(135deg, var(--brown-dark), var(--brown-mid));
            color: white;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            position: relative;
        }
        .floating-brownie {
            position: absolute;
            font-size: 2.8rem;
            opacity: 0.65;
            animation: drift 22s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        .crumb {
            font-size: 1.1rem;
            opacity: 0.45;
            animation-duration: 11s !important;
        }
        @keyframes drift {
            0%   { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-110vh) rotate(1080deg); }
        }
        .card {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(12px);
            border: none;
            border-radius: 1.25rem;
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
            color: var(--brown-dark);
        }
        .btn-submit {
            background: linear-gradient(135deg, var(--brown-light), var(--brown-mid));
            border: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(139,90,43,0.5);
        }
        .form-control, .form-select {
            border-color: #d2b48c;
            border-radius: 0.75rem;
        }
        .form-control:focus {
            border-color: var(--brown-light);
            box-shadow: 0 0 0 0.25rem rgba(139,90,43,0.25);
        }
    </style>
</head>
<body>

<div class="floating-brownie" style="left:8%; animation-duration:26s;">🍪</div>
<div class="floating-brownie" style="left:22%; animation-duration:32s; animation-delay:-6s;">🍫</div>
<div class="floating-brownie crumb" style="left:38%; animation-duration:13s;">•</div>
<div class="floating-brownie" style="left:52%; animation-duration:20s; animation-delay:-10s;">🍪</div>
<div class="floating-brownie" style="left:68%; animation-duration:28s;">🍪</div>
<div class="floating-brownie crumb" style="left:84%; animation-duration:15s; animation-delay:-4s;">•</div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-10">

            <div class="card p-4 p-md-5 shadow-lg">
                <h2 class="text-center fw-bold mb-4">Brownies Payment</h2>

                <form id="paymentForm">
                    <div class="mb-4">
                        <label class="form-label fw-semibold fs-5">Payment Method</label>
                        <select class="form-select form-select-lg" id="paymentType" required>
                            <option value="" disabled selected>Select how you'd like to pay…</option>
                            <option value="CARD">💳 Card (Pay Now)</option>
                            <option value="COD">💵 Cash on Delivery</option>
                        </select>
                    </div>

                    <!-- Card payment fields -->
                    <div id="cardFields" class="collapse">
                        <div class="mb-3">
                            <label class="form-label">Card Number</label>
                            <input type="text" class="form-control form-control-lg" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required/>
                            <div class="invalid-feedback" id="cardErr"></div>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Expiry (MM/YY)</label>
                                <input type="text" class="form-control form-control-lg" id="expiry" placeholder="MM/YY" maxlength="5" required/>
                                <div class="invalid-feedback" id="expErr"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">CVV</label>
                                <input type="text" class="form-control form-control-lg" id="cvv" placeholder="123" maxlength="4" required/>
                                <div class="invalid-feedback" id="cvvErr"></div>
                            </div>
                        </div>
                        <div class="mt-3">
                            <label class="form-label">Name on Card</label>
                            <input type="text" class="form-control form-control-lg" id="cardName" placeholder="John Doe" required/>
                        </div>
                    </div>

                    <!-- COD message -->
                    <div id="codFields" class="collapse mt-3">
                        <div class="alert alert-info border-0 bg-light text-dark">
                            <i class="fa-solid fa-info-circle me-2"></i>
                            Your order will be confirmed now.<br>
                            Pay <strong>cash</strong> when the brownies are delivered.
                        </div>
                    </div>

                    <button id="submitBtn" type="submit" class="btn btn-submit btn-lg w-100 mt-4">
                        <i class="fa-solid fa-check me-2"></i> Proceed
                    </button>
                </form>
            </div>

            <!-- Customer links -->
            <div class="text-center mt-5">
                <a href="payment-history.html" class="btn btn-outline-light btn-lg px-5 py-3">
                    <i class="fa-solid fa-receipt me-2"></i> View My Payment History
                </a>
            </div>

        </div>
    </div>
</div>

<!-- Success Modal -->
<div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-body text-center py-5">
                <i class="fa-solid fa-circle-check fa-6x text-success mb-4"></i>
                <h3 class="fw-bold text-success mb-3" id="modalTitle">Success!</h3>
                <p class="lead text-muted mb-4" id="modalText"></p>
                <button type="button" class="btn btn-success btn-lg px-5" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Card / COD toggle
    const typeSel = document.getElementById('paymentType');
    const cardSec = document.getElementById('cardFields');
    const codSec  = document.getElementById('codFields');
    const btn     = document.getElementById('submitBtn');

    typeSel.addEventListener('change', () => {
        const isCard = typeSel.value === 'CARD';
        cardSec.classList.toggle('show', isCard);
        codSec.classList.toggle('show', !isCard);

        btn.innerHTML = isCard
            ? '<i class="fa-solid fa-credit-card me-2"></i> Pay Now'
            : '<i class="fa-solid fa-box-check me-2"></i> Confirm Order';
    });

    // Input masking
    document.addEventListener('DOMContentLoaded', () => {
        const cn = document.getElementById('cardNumber');
        const ex = document.getElementById('expiry');
        const cv = document.getElementById('cvv');

        cn?.addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g,'').slice(0,16);
            e.target.value = v.match(/.{1,4}/g)?.join(' ') || v;
        });

        ex?.addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g,'').slice(0,4);
            if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
            e.target.value = v;
        });

        cv?.addEventListener('input', e => {
            e.target.value = e.target.value.replace(/\D/g,'').slice(0,4);
        });
    });

    // Submit → show success modal (replace with real API later)
    document.getElementById('paymentForm')?.addEventListener('submit', e => {
        e.preventDefault();

        const type = typeSel.value;
        if (!type) return;

        const modal = new bootstrap.Modal(document.getElementById('successModal'));
        const title = document.getElementById('modalTitle');
        const text  = document.getElementById('modalText');

        if (type === 'CARD') {
            // Very basic client-side check
            const num = document.getElementById('cardNumber').value.replace(/\D/g,'');
            if (num.length !== 16) return alert('Card number must be 16 digits');
            // ... more checks if you want

            title.textContent = 'Payment Successful!';
            text.innerHTML = 'Your payment was processed securely.<br>Your brownies are being prepared 🍪';
        } else {
            title.textContent = 'Order Confirmed!';
            text.innerHTML = 'Cash on delivery selected.<br>Pay when your order arrives.';
        }

        modal.show();
    });
</script>
</body>
</html>
