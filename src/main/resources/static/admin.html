<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin • Sugar Corner</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">

<!-- Full-page background image (brownie/caramel style) -->
<div class="page-background"></div>

<div class="page-background"></div>
<div class="background-overlay"></div>
<!-- Dark overlay for readability -->
<div class="background-overlay"></div>

<!-- Navigation Bar -->
<nav class="navbar">
    <div class="navbar-container">
        <a href="/products.html" class="logo">
            Sugar<span>Corner</span>
        </a>

        <div class="menu-toggle" id="menuToggle">☰</div>

        <ul class="nav-links" id="navLinks">
            <li><a href="/products.html">Shop</a></li>
            <li><a href="/admin.html" class="active">product Admin Panel</a></li>
            <li><a href="/admin-dashboard.html">feedback Admin Panel </a></li>
        </ul>
    </div>
</nav>

<!-- Main content wrapper -->
<div class="main-content">
    <div class="container">
        <h2>Manage Products</h2>

        <form id="productForm">
            <input type="hidden" id="productId" />

            <div class="form-group">
                <label for="name">Product Name *</label>
                <input type="text" id="name" required placeholder="e.g. Triple Chocolate Brownie" />
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" rows="4" placeholder="Taste, ingredients, allergens..."></textarea>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" placeholder="Brownies, Cookies, Cakes..." />
            </div>

            <div class="form-group">
                <label for="price">Price (LKR) *</label>
                <input type="number" id="price" step="0.01" min="0" required placeholder="250.00" />
            </div>

            <div class="form-group">
                <label for="imageFile">Product Photo</label>
                <input type="file" id="imageFile" accept="image/jpeg,image/png,image/webp" />
                <div class="current-image" style="margin-top: 0.6rem; color: #040000;">
                    Current: <span id="currentImageName">None</span>
                </div>
                <img id="previewImg" style="max-width: 240px; border-radius: 12px; margin-top: 0.8rem; display: none;" alt="Current image" />
            </div>

            <div class="form-group">
                <label for="quantity">Stock Quantity</label>
                <input type="number" id="quantity" min="0" value="0" />
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 0.8rem;">
                <input type="checkbox" id="featured" />
                <label for="featured" style="margin: 0; color: #191817;">Feature this product on homepage</label>
            </div>

            <div style="margin-top: 2.5rem; display: flex; gap: 1.2rem; flex-wrap: wrap;">
                <button type="submit" class="btn btn-primary">Save Product</button>
                <button type="button" id="cancelEdit" class="btn btn-secondary" style="display:none;">
                    Cancel Edit
                </button>
            </div>
        </form>

        <p id="message"></p>

        <h2>All Products</h2>

        <div class="table-container">
            <table id="productTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Photo</th>
                    <th>Featured</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="/admin.js"></script>

<!-- Mobile menu toggle script -->
<script>
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');

    if (menuToggle && navLinks) {
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    }

    // Optional: highlight current page
    document.querySelectorAll('.nav-links a').forEach(link => {
        if (link.href === window.location.href) {
            link.classList.add('active');
        }
    });
</script>

</body>
</html>
