<div th:replace="~{fragments/main :: main(content='customer/profile')}">
  <h1 class="text-4xl font-bold mb-8">My Profile</h1>

  <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl p-10">
    <form th:action="@{/customer/profile/update}" method="post" enctype="multipart/form-data">

      <div class="flex justify-center mb-8">
        <div class="relative">
          <img id="preview" th:src="${customer.profilePicture != null ? '/uploads/profiles/' + customer.profilePicture : '/images/default-avatar.png'}"
               class="w-32 h-32 rounded-full object-cover border-4 border-orange-500">
          <label class="absolute bottom-0 right-0 bg-orange-600 text-white rounded-full p-2 cursor-pointer">
            📸
            <input type="file" name="profilePhoto" accept="image/*" onchange="previewImage(event)" class="hidden">
          </label>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div>
          <label class="block text-sm mb-2">Full Name</label>
          <input type="text" name="fullName" th:value="${customer.fullName}" class="w-full px-5 py-4 border rounded-2xl">
        </div>
        <div>
          <label class="block text-sm mb-2">Email (cannot change)</label>
          <input type="email" th:value="${customer.email}" disabled class="w-full px-5 py-4 border rounded-2xl bg-gray-100">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-6 mt-6">
        <div>
          <label class="block text-sm mb-2">Phone Number</label>
          <input type="text" name="phone" th:value="${customer.phone}" class="w-full px-5 py-4 border rounded-2xl">
        </div>
        <div>
          <label class="block text-sm mb-2">Date of Birth</label>
          <input type="date" name="dateOfBirth" th:value="${customer.dateOfBirth}" class="w-full px-5 py-4 border rounded-2xl">
        </div>
      </div>

      <div class="mt-6">
        <label class="block text-sm mb-2">Address</label>
        <input type="text" name="address" th:value="${customer.address}" class="w-full px-5 py-4 border rounded-2xl">
      </div>

      <div class="grid grid-cols-2 gap-6 mt-6">
        <div>
          <label class="block text-sm mb-2">City</label>
          <input type="text" name="city" th:value="${customer.city}" class="w-full px-5 py-4 border rounded-2xl">
        </div>
        <div>
          <label class="block text-sm mb-2">Postal Code</label>
          <input type="text" name="postalCode" th:value="${customer.postalCode}" class="w-full px-5 py-4 border rounded-2xl">
        </div>
      </div>

      <button type="submit" class="mt-10 w-full bg-orange-600 hover:bg-orange-700 text-white py-5 rounded-3xl text-xl font-semibold">
        Update Profile
      </button>
    </form>
  </div>
</div>

<script>
  function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function() {
      document.getElementById('preview').src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
  }
</script>
