<div th:replace="~{fragments/main :: main(content='customer/order-history')}">
  <h1 class="text-4xl font-bold mb-8">My Order History</h1>

  <div class="bg-white rounded-3xl shadow overflow-hidden">
    <table class="w-full">
      <thead class="bg-gray-100">
      <tr>
        <th class="p-6 text-left">Order ID</th>
        <th class="p-6 text-left">Date</th>
        <th class="p-6 text-left">Status</th>
        <th class="p-6 text-right">Total (LKR)</th>
        <th class="p-6 text-center">Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="order : ${orders}" class="border-t hover:bg-gray-50">
        <td class="p-6 font-medium">#<span th:text="${order.id}"></span></td>
        <td class="p-6" th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
        <td class="p-6">
                    <span th:text="${order.status}" class="px-5 py-2 text-xs rounded-full"
                          th:classappend="${order.status == 'DELIVERED'} ? 'bg-green-100 text-green-700' :
                                         ${order.status == 'CANCELLED'} ? 'bg-red-100 text-red-700' : 'bg-orange-100 text-orange-700'">
                    </span>
        </td>
        <td class="p-6 text-right font-semibold" th:text="${order.totalAmount}"></td>
        <td class="p-6 text-center">
          <button th:onclick="|reorderOrder(${order.id})|"
                  class="bg-orange-600 text-white px-6 py-3 rounded-2xl text-sm font-medium">
            Reorder
          </button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  function reorderOrder(orderId) {
    fetch(`/customer/orders/${orderId}/reorder`, { method: 'POST' })
            .then(res => res.redirected ? window.location.href = res.url : alert("Reorder failed"));
  }
</script>
