<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Place Order - Sugar Corner</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .cart-item {
      transition: all 0.3s ease;
    }
    .cart-item:hover {
      background-color: #fff7ed;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-container">
    <a href="/customer/products" class="logo">Sugar<span>Corner</span></a>
    <div class="menu-toggle" id="menuToggle">☰</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="/customer/products">Shop</a></li>
      <li><a href="/customer/orders/place" class="active">Place Order</a></li>
      <li><a th:href="@{/customer/orders/history}">My Orders</a></li>
      <li><a th:href="@{/customer/profile}">Profile</a></li>
      <li><a th:href="@{/logout}">Logout</a></li>
    </ul>
  </div>
</nav>

<div class="container py-12">
  <div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold text-center mb-10">Place Your Order</h1>

    <div class="grid lg:grid-cols-12 gap-10">

      <!-- Left Side: Cart Items -->
      <div class="lg:col-span-7 bg-white rounded-3xl shadow-xl p-8">
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
          🛒 Your Cart (<span id="cartCount">0</span>)
        </h2>

        <div id="cartContainer" class="space-y-6 min-h-[400px]">
          <!-- Cart items loaded by JS -->
        </div>

        <div class="flex justify-center mt-8">
          <a th:href="@{/customer/products}"
             class="flex items-center gap-3 text-orange-600 hover:text-orange-700 font-medium">
            <span class="text-2xl">+</span> Add More Brownies
          </a>
        </div>
      </div>

      <!-- Right Side: Order Summary & Checkout -->
      <div class="lg:col-span-5">
        <div class="bg-white rounded-3xl shadow-xl p-8 sticky top-6">
          <h2 class="text-2xl font-semibold mb-6">Order Summary</h2>

          <div class="space-y-4 mb-8">
            <div class="flex justify-between text-lg">
              <span class="text-gray-600">Subtotal</span>
              <span id="subtotal" class="font-semibold">LKR 0.00</span>
            </div>
            <div class="flex justify-between text-lg border-t pt-4">
              <span class="font-bold">Total Amount</span>
              <span id="totalAmount" class="text-3xl font-bold text-orange-600">LKR 0.00</span>
            </div>
          </div>

          <!-- Delivery Address -->
          <div class="mb-8">
            <label class="block text-sm font-medium mb-3">Delivery Address</label>
            <textarea id="deliveryAddress" rows="4"
                      class="w-full p-5 border border-gray-300 rounded-3xl focus:outline-none focus:border-orange-500"
                      placeholder="Enter your full delivery address..."></textarea>
          </div>

          <!-- Payment Method -->
          <div class="mb-10">
            <label class="block text-sm font-medium mb-4">Payment Method</label>
            <div class="space-y-4">
              <label class="flex items-center gap-4 border-2 border-orange-500 p-5 rounded-3xl cursor-pointer bg-orange-50">
                <input type="radio" name="paymentMethod" value="COD" checked class="w-5 h-5 accent-orange-600">
                <div>
                  <p class="font-semibold text-lg">Cash on Delivery (COD)</p>
                  <p class="text-sm text-gray-500">Pay when you receive your order</p>
                </div>
              </label>

              <label class="flex items-center gap-4 border border-gray-300 p-5 rounded-3xl cursor-not-allowed opacity-60">
                <input type="radio" name="paymentMethod" value="ONLINE" disabled class="w-5 h-5">
                <div>
                  <p class="font-semibold text-lg text-gray-400">Online Card Payment</p>
                  <p class="text-sm text-gray-400">Coming soon</p>
                </div>
              </label>
            </div>
          </div>

          <!-- Confirm Order Button -->
          <button onclick="submitOrder()"
                  class="w-full py-6 bg-green-600 hover:bg-green-700 text-white text-xl font-bold rounded-3xl shadow-lg transition transform hover:scale-105">
            Confirm Order & Place
          </button>

          <p class="text-center text-xs text-gray-500 mt-6">
            Your order will be prepared fresh and delivered soon
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let cart = [];

  // Render Cart
  function renderCart() {
    const container = document.getElementById('cartContainer');
    let total = 0;
    let count = 0;

    if (cart.length === 0) {
      container.innerHTML = `
            <div class="text-center py-20">
                <p class="text-2xl text-gray-400">Your cart is empty</p>
                <a th:href="@{/customer/products}" class="mt-6 inline-block text-orange-600 hover:underline">
                    Browse Brownies →
                </a>
            </div>`;
      updateTotal(0);
      return;
    }

    let html = '';
    cart.forEach((item, index) => {
      const subtotal = item.price * item.quantity;
      total += subtotal;
      count += item.quantity;

      html += `
            <div class="cart-item flex justify-between items-center bg-gray-50 p-6 rounded-3xl">
                <div class="flex-1">
                    <p class="font-semibold text-lg">${item.name}</p>
                    <p class="text-orange-600">LKR ${item.price} × ${item.quantity}</p>
                </div>
                <div class="text-right">
                    <p class="font-bold text-xl">LKR ${subtotal}</p>
                    <button onclick="removeFromCart(${index})"
                            class="text-red-500 hover:text-red-700 text-3xl mt-2">×</button>
                </div>
            </div>`;
    });

    container.innerHTML = html;
    updateTotal(total);
    document.getElementById('cartCount').textContent = count;
  }

  function updateTotal(total) {
    document.getElementById('subtotal').textContent = `LKR ${total}`;
    document.getElementById('totalAmount').textContent = `LKR ${total}`;
  }

  function removeFromCart(index) {
    if (confirm("Remove this item?")) {
      cart.splice(index, 1);
      renderCart();
    }
  }

  // Submit Order
  async function submitOrder() {
    if (cart.length === 0) {
      alert("Your cart is empty!");
      return;
    }

    const deliveryAddr = document.getElementById('deliveryAddress').value.trim();
    if (!deliveryAddr) {
      alert("Please enter your delivery address");
      return;
    }

    const orderRequest = {
      orderType: "DELIVERY",
      deliveryAddress: deliveryAddr,
      customerNote: "",
      items: cart.map(item => ({
        productName: item.name,
        quantity: item.quantity,
        unitPrice: item.price
      }))
    };

    try {
      const res = await fetch('/customer/orders/place', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(orderRequest)
      });

      if (res.ok) {
        const order = await res.json();
        alert(`✅ Order #${order.id} placed successfully!\nPayment: Cash on Delivery`);
        cart = []; // Clear cart
        window.location.href = "/customer/orders/history";
      } else {
        alert("Failed to place order. Please try again.");
      }
    } catch (err) {
      console.error(err);
      alert("Connection error. Please check your internet.");
    }
  }

  // Load cart (from session if reorder)
  window.onload = function() {
    if (typeof reorderItems !== 'undefined' && reorderItems && reorderItems.length > 0) {
      cart = reorderItems;
    }
    renderCart();
  };

  // Mobile menu
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('navLinks').classList.toggle('active');
  });
</script>

</body>
</html>
