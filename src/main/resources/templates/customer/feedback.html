<div th:replace="~{fragments/main :: main(content='customer/feedback')}">
  <h1 class="text-4xl font-bold mb-8">Send Feedback / Inquiry</h1>

  <div class="max-w-2xl mx-auto bg-white p-10 rounded-3xl shadow">
    <form id="feedbackForm">
            <textarea id="message" rows="6"
                      class="w-full p-5 border border-gray-300 rounded-3xl focus:outline-none focus:border-orange-500"
                      placeholder="Your message or inquiry..."></textarea>

      <button type="button" onclick="submitFeedback()"
              class="mt-8 w-full bg-orange-600 hover:bg-orange-700 text-white py-5 rounded-3xl text-lg font-medium">
        Send Message
      </button>
    </form>
  </div>
</div>
