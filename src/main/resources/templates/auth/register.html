<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Brownies Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-orange-50 to-amber-100 min-h-screen flex items-center justify-center">
<div class="max-w-lg w-full mx-4">
    <div class="bg-white rounded-3xl shadow-2xl p-10">
        <div class="text-center mb-8">
            <div class="text-5xl mb-4">🍪</div>
            <h1 class="text-3xl font-bold text-orange-600">Create Account</h1>
        </div>

        <form th:action="@{/register}" method="post" class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm mb-2">Full Name</label>
                    <input type="text" name="fullName" required class="w-full px-4 py-3 border rounded-2xl">
                </div>
                <div>
                    <label class="block text-sm mb-2">Phone Number</label>
                    <input type="text" name="phone" class="w-full px-4 py-3 border rounded-2xl">
                </div>
            </div>

            <div>
                <label class="block text-sm mb-2">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-3 border rounded-2xl">
            </div>

            <div>
                <label class="block text-sm mb-2">Address</label>
                <input type="text" name="address" class="w-full px-4 py-3 border rounded-2xl">
            </div>

            <div>
                <label class="block text-sm mb-2">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 border rounded-2xl">
            </div>

            <button type="submit"
                    class="w-full bg-orange-600 hover:bg-orange-700 text-white py-4 rounded-2xl text-lg font-semibold">
                Create Account
            </button>
        </form>

        <div class="mt-6 text-center text-sm">
            Already have an account?
            <a th:href="@{/login}" class="text-orange-600 hover:underline">Login here</a>
        </div>
    </div>
</div>
</body>
</html>
