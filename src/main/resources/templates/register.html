<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - Brownie Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-container">
    <div class="auth-box">

        <h2>Create Account</h2>
        <p class="subtitle">Join Brownie Shop today</p>

        <!-- Error message -->
        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>

        <!-- Register form -->
        <form action="/register" method="post">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text"
                       name="fullName"
                       placeholder="Enter your full name"
                       required/>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email"
                       name="email"
                       placeholder="Enter your email"
                       required/>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text"
                       name="phone"
                       placeholder="Enter your phone number"/>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password"
                       name="password"
                       placeholder="Create a password"
                       required/>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Create a password"
                           required/>
                    <span class="eye-icon" onclick="togglePassword('password', this)">👁</span>
                </div>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <small class="strength-text" id="strengthText"></small>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password"
                           id="confirmPassword"
                           name="confirmPassword"
                           placeholder="Confirm your password"
                           required/>
                    <span class="eye-icon" onclick="togglePassword('confirmPassword', this)">👁</span>
                </div>
                <small class="match-text" id="matchText"></small>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>

        </form>

        <div class="auth-links">
            <span>Already have an account? </span>
            <a href="/login">Login here</a>
        </div>

    </div>
</div>

<script th:src="@{/js/main.js}"></script>

<script>
    function togglePassword(fieldId, icon) {
        const input = document.getElementById(fieldId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = '🙈';
        } else {
            input.type = 'password';
            icon.textContent = '👁';
        }
    }
</script>

</body>
</html>
