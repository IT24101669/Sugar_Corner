<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Sugar Corner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body class="bg-gray-100">

<nav class="bg-amber-800 text-white p-4 shadow-lg">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <h1 class="text-2xl font-bold">🍪 Sugar Corner Admin</h1>
    <div class="flex gap-6">
      <a href="/admin/products" class="hover:text-amber-200">Products</a>
      <a href="/admin/support" class="hover:text-amber-200 font-semibold">Support (Feedback & Inquiries)</a>
      <a th:href="@{/logout}" class="hover:text-amber-200">Logout</a>
    </div>
  </div>
</nav>

<div class="max-w-7xl mx-auto p-6">
  <h2 class="text-3xl font-bold mb-8">Admin Dashboard</h2>

  <!-- Quick Stats -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
    <div class="bg-white p-6 rounded-2xl shadow">
      <p class="text-gray-500">Total Products</p>
      <p id="totalProducts" class="text-4xl font-bold text-amber-600">0</p>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow">
      <p class="text-gray-500">New Inquiries</p>
      <p id="newInquiries" class="text-4xl font-bold text-red-600">0</p>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow">
      <p class="text-gray-500">Pending Feedback</p>
      <p id="pendingFeedback" class="text-4xl font-bold text-orange-600">0</p>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow">
      <p class="text-gray-500">Featured Products</p>
      <p id="featuredCount" class="text-4xl font-bold text-green-600">0</p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="flex border-b mb-6">
    <button onclick="showTab(0)" class="tab-button active px-8 py-3 font-medium" id="tab0">Products Management</button>
    <button onclick="showTab(1)" class="tab-button px-8 py-3 font-medium" id="tab1">Support Center</button>
  </div>

  <!-- Tab 1: Products -->
  <div id="tabContent0" class="tab-content">
    <div th:replace="~{admin/products :: productsContent}"></div>
  </div>

  <!-- Tab 2: Support -->
  <div id="tabContent1" class="tab-content hidden">
    <div th:replace="~{admin/support :: supportContent}"></div>
  </div>
</div>

<script th:src="@{/js/admin.js}"></script>
<script>
  function showTab(n) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById('tabContent'+n).classList.remove('hidden');

    document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active', 'border-b-4', 'border-amber-600'));
    document.getElementById('tab'+n).classList.add('active', 'border-b-4', 'border-amber-600');
  }
</script>
</body>
</html>
