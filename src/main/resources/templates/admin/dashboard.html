<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sugar Corner Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div th:replace="~{fragments/admin-layout :: admin-layout(content='admin/dashboard-content')}">

  <h1 class="text-4xl font-bold mb-8">Admin Dashboard</h1>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
    <div class="bg-white p-8 rounded-3xl shadow">
      <p class="text-gray-500">Pending</p>
      <p class="text-5xl font-bold text-orange-600" th:text="${pendingCount}"></p>
    </div>
    <div class="bg-white p-8 rounded-3xl shadow">
      <p class="text-gray-500">In Preparation</p>
      <p class="text-5xl font-bold text-amber-600" th:text="${bakingCount}"></p>
    </div>
    <div class="bg-white p-8 rounded-3xl shadow">
      <p class="text-gray-500">Delivered</p>
      <p class="text-5xl font-bold text-green-600" th:text="${deliveredCount}"></p>
    </div>
    <div class="bg-white p-8 rounded-3xl shadow">
      <p class="text-gray-500">New Orders</p>
      <p class="text-5xl font-bold text-red-600" th:text="${newOrderCount}"></p>
    </div>
  </div>

  <div class="bg-white rounded-3xl shadow p-8">
    <h2 class="text-2xl font-semibold mb-6">Recent Orders</h2>
    <table class="w-full">
      <thead class="border-b">
      <tr>
        <th class="text-left py-4">Order ID</th>
        <th class="text-left py-4">Customer</th>
        <th class="text-left py-4">Status</th>
        <th class="text-right py-4">Total (LKR)</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="order : ${allOrders}" class="border-b hover:bg-gray-50">
        <td class="py-4">#<span th:text="${order.id}"></span></td>
        <td class="py-4" th:text="${order.customerName}"></td>
        <td class="py-4">
                            <span th:text="${order.status}"
                                  class="px-4 py-1 rounded-full text-xs"
                                  th:classappend="${order.status == 'PENDING'} ? 'bg-orange-100 text-orange-700' :
                                                  ${order.status == 'DELIVERED'} ? 'bg-green-100 text-green-700' : 'bg-gray-100'">
                            </span>
        </td>
        <td class="py-4 text-right font-medium" th:text="${order.totalAmount}"></td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
