<div th:replace="~{admin.auth/main :: main(content='admin/products')}">

  <div class="flex justify-between items-center mb-8">
    <h1 class="text-4xl font-bold text-gray-800">Products Management</h1>
    <button onclick="showAddProductModal()"
            class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
      <span class="text-xl">+</span> Add New Product
    </button>
  </div>

  <!-- Products Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="productGrid">
    <!-- JavaScript මගින් load වෙනවා -->
  </div>
</div>

<!-- Simple Modal for Add/Edit Product -->
<div id="productModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-auto">
    <div class="p-8">
      <h2 id="modalTitle" class="text-2xl font-bold mb-6">Add New Product</h2>

      <form id="productForm" enctype="multipart/form-data">
        <input type="hidden" id="productId">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium mb-2">Product Name *</label>
            <input type="text" id="name" required class="w-full px-4 py-3 border rounded-2xl">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Price (LKR) *</label>
            <input type="number" id="price" step="0.01" required class="w-full px-4 py-3 border rounded-2xl">
          </div>
        </div>

        <div class="mt-6">
          <label class="block text-sm font-medium mb-2">Category</label>
          <select id="category" class="w-full px-4 py-3 border rounded-2xl">
            <option value="">Select Category</option>
            <option value="brownies">Brownies</option>
            <option value="cookies">Cookies</option>
            <option value="cakes">Cakes</option>
          </select>
        </div>

        <div class="mt-6">
          <label class="block text-sm font-medium mb-2">Description</label>
          <textarea id="description" rows="3" class="w-full px-4 py-3 border rounded-2xl"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-6 mt-6">
          <div>
            <label class="block text-sm font-medium mb-2">Stock Quantity</label>
            <input type="number" id="quantity" value="0" class="w-full px-4 py-3 border rounded-2xl">
          </div>
          <div class="flex items-center gap-3 mt-8">
            <input type="checkbox" id="featured" class="w-5 h-5">
            <label for="featured" class="text-sm">Feature on Homepage</label>
          </div>
        </div>

        <div class="mt-6">
          <label class="block text-sm font-medium mb-2">Product Image</label>
          <input type="file" id="imageFile" accept="image/*" class="w-full">
          <div id="currentImage" class="mt-3 text-sm text-gray-500"></div>
        </div>

        <div class="flex gap-4 mt-10">
          <button type="button" onclick="saveProduct()"
                  class="flex-1 bg-orange-600 hover:bg-orange-700 text-white py-4 rounded-2xl font-semibold">
            Save Product
          </button>
          <button type="button" onclick="closeModal()"
                  class="flex-1 bg-gray-200 hover:bg-gray-300 py-4 rounded-2xl font-semibold">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  async function loadProducts() {
    const res = await fetch('/api/products');
    const products = await res.json();

    const grid = document.getElementById('productGrid');
    grid.innerHTML = products.map(p => `
        <div class="bg-white rounded-3xl shadow overflow-hidden">
            <img src="${p.imageUrl || '/images/default-brownie.jpg'}"
                 class="w-full h-56 object-cover">
            <div class="p-6">
                <h3 class="font-bold text-xl">${p.name}</h3>
                <p class="text-orange-600 text-2xl font-semibold mt-1">LKR ${p.price}</p>
                <p class="text-sm text-gray-500 mt-2">${p.category || 'No category'}</p>

                <div class="flex gap-3 mt-6">
                    <button onclick="editProduct(${p.id})"
                            class="flex-1 bg-blue-600 text-white py-3 rounded-2xl text-sm font-medium">
                        Edit
                    </button>
                    <button onclick="deleteProduct(${p.id})"
                            class="flex-1 bg-red-600 text-white py-3 rounded-2xl text-sm font-medium">
                        Delete
                    </button>
                </div>
            </div>
        </div>
    `).join('');
  }

  async function saveProduct() {
    // FormData සමග multipart request යවන්න (image සමග)
    const formData = new FormData();

    const product = {
      name: document.getElementById('name').value,
      price: parseFloat(document.getElementById('price').value),
      category: document.getElementById('category').value,
      description: document.getElementById('description').value,
      quantity: parseInt(document.getElementById('quantity').value) || 0,
      featured: document.getElementById('featured').checked
    };

    formData.append('product', new Blob([JSON.stringify(product)], {type: 'application/json'}));

    const imageFile = document.getElementById('imageFile').files[0];
    if (imageFile) formData.append('image', imageFile);

    const id = document.getElementById('productId').value;
    const url = id ? `/api/products/${id}` : '/api/products';
    const method = id ? 'PUT' : 'POST';

    try {
      const res = await fetch(url, { method, body: formData });
      if (res.ok) {
        alert(id ? 'Product Updated!' : 'Product Added Successfully!');
        closeModal();
        loadProducts();
      }
    } catch(e) {
      alert('Error saving product');
    }
  }

  function showAddProductModal() {
    document.getElementById('productForm').reset();
    document.getElementById('productId').value = '';
    document.getElementById('modalTitle').textContent = 'Add New Product';
    document.getElementById('productModal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('productModal').classList.add('hidden');
  }

  // Load products when page loads
  window.onload = loadProducts;
</script>
</div>
