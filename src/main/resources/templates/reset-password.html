<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Brownie Shop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="auth-container">
    <div class="auth-box">

        <h2>Reset Password</h2>
        <p class="subtitle">Enter your email to reset your password</p>

        <!-- Success message -->
        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>

        <!-- Error message -->
        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>

        <!-- Step 1 - Enter email to get token -->
        <div th:if="${token == null}">
            <form action="/reset-password" method="post">

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email"
                           name="email"
                           placeholder="Enter your registered email"
                           required/>
                </div>

                <button type="submit" class="btn-primary">Send Reset Token</button>

            </form>
        </div>

        <!-- Step 2 - Enter token and new password -->
        <div th:if="${token != null}">
            <form action="/reset-password/confirm" method="post">

                <div class="form-group">
                    <label>Reset Token</label>
                    <input type="text"
                           name="token"
                           th:value="${token}"
                           readonly/>
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <input type="password"
                           name="newPassword"
                           placeholder="Enter new password"
                           required/>
                </div>



                <div class="form-group">
                    <label>Confirm New Password</label>
                    <div class="password-wrapper">
                        <input type="password"
                               id="confirmPassword"
                               name="confirmPassword"
                               placeholder="Confirm new password"
                               required/>
                        <span class="eye-icon" onclick="togglePassword('confirmPassword', this)">👁</span>
                    </div>
                    <small class="match-text" id="matchText"></small>
                </div>

                <button type="submit" class="btn-primary">Reset Password</button>

            </form>
        </div>

        <div class="auth-links">
            <a href="/login">Back to Login</a>
        </div>

    </div>
</div>

<script th:src="@{/js/main.js}"></script>

<script>
    function togglePassword(fieldId, icon) {
        const input = document.getElementById(fieldId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = '🙈';
        } else {
            input.type = 'password';
            icon.textContent = '👁';
        }
    }
</script>

</body>
</html>
