<!-- templates/fragments/navbar.html -->
<div th:fragment="navbar">
    <nav class="bg-orange-600 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

            <!-- Logo -->
            <a href="/" class="text-3xl font-bold flex items-center gap-2">
                🍪 Sugar Corner
            </a>

            <!-- Navigation Menu -->
            <div th:if="${#authentication.name != null}" class="hidden md:flex items-center gap-8 text-lg">

                <!-- CUSTOMER MENU -->
                <div th:if="${#authentication.principal.authorities.?[authority == 'ROLE_CUSTOMER'].size() > 0}"
                     class="flex gap-7">
                    <a th:href="@{/customer/products}" class="hover:text-amber-200 transition">Shop</a>
                    <a th:href="@{/customer/orders/place}" class="hover:text-amber-200 transition flex items-center gap-1">
                        Cart <span id="cartCount" class="bg-white text-orange-600 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
                    </a>
                    <a th:href="@{/customer/orders/history}" class="hover:text-amber-200 transition">My Orders</a>
                    <a th:href="@{/customer/profile}" class="hover:text-amber-200 transition">Profile</a>
                    <a th:href="@{/customer/feedback}" class="hover:text-amber-200 transition">Support</a>
                </div>

                <!-- ADMIN MENU -->
                <div th:if="${#authentication.principal.authorities.?[authority == 'ROLE_ADMIN'].size() > 0}"
                     class="flex gap-7">
                    <a th:href="@{/admin/dashboard}" class="hover:text-amber-200 transition">Dashboard</a>
                    <a th:href="@{/admin/orders}" class="hover:text-amber-200 transition">Orders</a>
                    <a th:href="@{/admin/products}" class="hover:text-amber-200 transition">Products</a>
                    <a th:href="@{/admin/customers}" class="hover:text-amber-200 transition">Customers</a>
                    <a th:href="@{/admin/payments}" class="hover:text-amber-200 transition">Payments</a>
                    <a th:href="@{/admin/feedback-inquiries}" class="hover:text-amber-200 transition">Support</a>
                </div>
            </div>

            <!-- Right Side -->
            <div class="flex items-center gap-4">
                <span th:if="${#authentication.name != null}" class="text-sm hidden sm:block">
                    Hi, <span th:text="${#authentication.name}"></span>
                </span>

                <a th:if="${#authentication.name == null}"
                   th:href="@{/login}"
                   class="px-6 py-2.5 rounded-2xl font-medium hover:bg-orange-700 transition">
                    Login
                </a>

                <a th:if="${#authentication.name != null}"
                   th:href="@{/logout}"
                   class="bg-white text-orange-600 px-6 py-2.5 rounded-2xl font-medium hover:bg-amber-100 transition">
                    Logout
                </a>
            </div>
        </div>
    </nav>
</div>
