<div th:replace="~{layout/main :: main(content='admin/customers')}">
    <h1 class="text-4xl font-bold mb-8">Customers</h1>
    <div class="bg-white rounded-3xl shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-100">
            <tr>
                <th class="p-6 text-left">Name</th>
                <th class="p-6 text-left">Email</th>
                <th class="p-6 text-left">Phone</th>
                <th class="p-6 text-center">Status</th>
                <th class="p-6 text-center">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cust : ${customers}" class="border-t">
                <td class="p-6" th:text="${cust.fullName}"></td>
                <td class="p-6" th:text="${cust.email}"></td>
                <td class="p-6" th:text="${cust.phone}"></td>
                <td class="p-6 text-center">
                    <span th:if="${cust.isActive}" class="px-4 py-1 bg-green-100 text-green-700 rounded-full text-xs">Active</span>
                    <span th:if="${!cust.isActive}" class="px-4 py-1 bg-red-100 text-red-700 rounded-full text-xs">Blocked</span>
                </td>
                <td class="p-6 text-center">
                    <form th:action="@{/admin/customers/toggle/{id}(id=${cust.id})}" method="post">
                        <button type="submit" class="text-orange-600 hover:underline">Toggle Status</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
