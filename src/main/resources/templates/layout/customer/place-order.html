<div th:replace="~{layout/main :: main(content='customer/place-order')}">
    <h1 class="text-4xl font-bold mb-8 text-center">Place Your Order</h1>

    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl p-8 md:p-10">

        <!-- Cart Items -->
        <div id="cartContainer" class="min-h-[300px] mb-10"></div>

        <!-- Add More Button -->
        <div class="flex justify-center mb-8">
            <button onclick="addProductToCart()"
                    class="flex items-center gap-3 bg-orange-500 hover:bg-orange-600 text-white px-8 py-4 rounded-3xl text-lg font-medium">
                <span class="text-2xl">+</span> Add More Brownies
            </button>
        </div>

        <!-- Confirm Order Button -->
        <button onclick="submitOrder()"
                class="w-full py-5 bg-green-600 hover:bg-green-700 text-white text-xl font-semibold rounded-3xl shadow-lg">
            Confirm Order - Cash on Delivery
        </button>
    </div>
</div>
