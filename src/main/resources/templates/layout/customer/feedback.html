<div th:replace="~{layout/main :: main(content='customer/feedback')}">
    <h1 class="text-4xl font-bold mb-8">Send Feedback / Inquiry</h1>
    <form id="feedbackForm" class="max-w-2xl bg-white p-10 rounded-3xl shadow">
        <textarea id="message" rows="6" class="w-full p-4 border rounded-2xl" placeholder="Your message..."></textarea>
        <button type="button" onclick="submitFeedback()" class="mt-6 bg-orange-500 text-white px-10 py-4 rounded-3xl">Send Message</button>
    </form>
</div>
