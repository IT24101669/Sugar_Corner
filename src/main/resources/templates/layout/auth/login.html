<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brownies Shop - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-orange-50 min-h-screen flex items-center justify-center">
<div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-orange-600">🍪 Brownies Shop</h1>
        <p class="text-gray-500 mt-2">Login to your Brownie Shop account</p>
    </div>

    <form th:action="@{/login}" method="post" class="space-y-6">
        <div>
            <label class="block text-sm font-medium mb-1">Email Address</label>
            <input type="email" name="email" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-orange-500"
                   placeholder="Enter your email">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Password</label>
            <input type="password" name="password" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-orange-500"
                   placeholder="Enter your password">
        </div>

        <button type="submit"
                class="w-full bg-orange-600 hover:bg-orange-700 text-white py-4 rounded-3xl text-lg font-medium">
            Login
        </button>
    </form>

    <div class="mt-6 flex justify-between text-sm">
        <a th:href="@{/reset-password}" class="text-orange-600 hover:underline">Forgot your password?</a>
        <a th:href="@{/register}" class="text-orange-600 hover:underline">Create an account</a>
    </div>

    <!-- Error message from your controller -->
    <div th:if="${error}" class="mt-4 p-3 bg-red-100 text-red-600 rounded-2xl text-center">
        Invalid email or password.
    </div>
</div>
</body>
</html>
