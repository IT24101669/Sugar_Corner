<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-orange-50 min-h-screen flex items-center justify-center">
<div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10">
    <h1 class="text-3xl font-bold text-center mb-8">Reset Password</h1>

    <form th:action="@{/reset-password}" method="post" class="space-y-6">
        <input type="email" name="email" placeholder="Your Email" required class="w-full px-4 py-3 border rounded-2xl">
        <button type="submit" class="w-full bg-orange-600 text-white py-4 rounded-3xl">Send Reset Token</button>
    </form>

    <div th:if="${success}" class="mt-6 text-green-600 text-center">Token sent! Check your email.</div>
    <div th:if="${error}" class="mt-6 text-red-600 text-center" th:text="${error}"></div>
</div>
</body>
</html>
