<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Payments • Brownies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f8f1e9; color:#3C2F2F; min-height:100vh; }
        .table thead th { background:#5C4033; color:white; }
        .badge { padding:0.5em 1em; font-size:0.95rem; }
    </style>
</head>
<body class="py-5">
<div class="container">
    <h2 class="text-center mb-5 fw-bold">My Payment History 🍪</h2>

    <div id="loading" class="text-center my-5">
        <div class="spinner-border text-brown" role="status"></div>
        <p class="mt-2">Loading your payments...</p>
    </div>

    <div class="table-responsive" id="tableWrap" style="display:none;">
        <table class="table table-hover shadow-sm">
            <thead>
            <tr>
                <th>Order ID</th>
                <th>Amount</th>
                <th>Method</th>
                <th>Status</th>
                <th>Date & Time</th>
            </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div id="noData" class="alert alert-info text-center" style="display:none;">
        No payments found yet.
    </div>
</div>

<script>
    // Change "CUST001" to real customer ID when you add login
    const CUSTOMER_ID = "CUST001";

    fetch(`http://localhost:8080/api/payments/customer/${CUSTOMER_ID}`)
        .then(r => {
            if (!r.ok) throw new Error(r.statusText);
            return r.json();
        })
        .then(data => {
            document.getElementById('loading').style.display = 'none';

            if (!data?.length) {
                document.getElementById('noData').style.display = 'block';
                return;
            }

            const tbody = document.getElementById('tbody');
            data.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
            <td class="fw-medium">${p.orderId}</td>
            <td>Rs ${Number(p.amount).toFixed(2)}</td>
            <td>${p.paymentType}</td>
            <td>
              <span class="badge bg-${p.status==='PAID'?'success':p.status==='REFUNDED'?'warning':'danger'}">
                ${p.status}
              </span>
            </td>
            <td>${new Date(p.timestamp).toLocaleString()}</td>
          `;
                tbody.appendChild(tr);
            });

            document.getElementById('tableWrap').style.display = 'block';
        })
        .catch(err => {
            document.getElementById('loading').innerHTML = `
          <div class="alert alert-danger">
            Could not load payments: ${err.message}
          </div>`;
        });
</script>
</body>
</html>
